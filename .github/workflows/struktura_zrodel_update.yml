name: Update ZONE heat sources data

on:
  schedule:
    - cron: "00 21 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-zone-heat-sources:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests openpyxl

      - name: Run script
        run: python scripts/struktura_zrodel_update.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data_xlsx/zone_struktura_zrodel_ciepla_polska.xlsx
          git add data_csv/zone_struktura_zrodel_ciepla_polska.csv

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ZONE heat sources data"
            git push
          fi
