name: Update ZONE buildings data

on:
  schedule:
    - cron: "00 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-zone-buildings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests openpyxl

      - name: Run script
        run: python budynki_update.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add zone_struktura_budynkow_zrodla_co_polska.xlsx zone_struktura_budynkow_zrodla_co_polska.csv
          git diff --cached --quiet || git commit -m "Update ZONE buildings data"
          git push
